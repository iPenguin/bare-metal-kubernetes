---

- name: Read current CoreDNS Corefile
  kubernetes.core.k8s_info:
    api_version: v1
    kind: ConfigMap
    name: coredns
    namespace: kube-system
  register: _coredns_cm

- name: Append {{ lan_domain }} stub zone to CoreDNS Corefile
  kubernetes.core.k8s:
    state: patched
    api_version: v1
    kind: ConfigMap
    name: coredns
    namespace: kube-system
    definition:
      data:
        Corefile: |
          {{ _coredns_cm.resources[0].data.Corefile }}
          {{ lan_domain }}:53 {
              errors
              cache 30
              forward . {{ network.ipv4.dns }} [{{ network.ipv6.dns }}]:53
          }
  register: _coredns_patch
  when:
    - _coredns_cm.resources | length > 0
    - (lan_domain ~ ':53') not in _coredns_cm.resources[0].data.Corefile

- name: Restart CoreDNS to load new Corefile
  command: kubectl -n kube-system rollout restart deployment/coredns
  when: _coredns_patch is defined and _coredns_patch.changed
