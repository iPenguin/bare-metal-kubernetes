---

- name: Create minio namespace
  kubernetes.core.k8s:
    api_version: v1
    kind: Namespace
    name: minio
    state: present

- name: Generate sealed secret for MinIO OIDC client
  become: false
  connection: local
  ansible.builtin.shell: |
    kubectl create secret generic minio-oidc-credentials \
    --dry-run=client \
    --from-literal=clientSecret={{ minio_client_secret }} \
    -n minio -o json | \
    kubeseal --controller-namespace=sealed-secrets \
    --controller-name=sealed-secrets -o yaml
  register: _minio_oidc_secret
  no_log: true

- name: Apply MinIO OIDC SealedSecret
  kubernetes.core.k8s:
    state: present
    namespace: minio
    definition: "{{ _minio_oidc_secret.stdout | from_yaml }}"
