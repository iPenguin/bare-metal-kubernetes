---
- name: Get Keycloak passwords
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Secret
    name: keycloak-passwords
    namespace: keycloak
  register: keycloak_secrets

- name: Get Keycloak admin password
  ansible.builtin.set_fact:
    keycloak_admin_password: "{{ keycloak_secrets.resources[0].data['adminPassword'] | b64decode }}"
    svc_ldap_password: "{{ keycloak_secrets.resources[0].data['BIND_PASSWORD'] | b64decode }}"

- name: Create a new realm in Keycloak
  community.general.keycloak_realm:
    auth_keycloak_url: "{{ keycloak.url }}"
    auth_username: "{{ keycloak.admin_username }}"
    auth_password: "{{ keycloak_admin_password }}"
    auth_realm: "{{ keycloak.admin_realm }}"
    realm: "{{ keycloak.realm }}"
    sso_session_idle_timeout: 86400
    sso_session_max_lifespan: 172800
    sso_session_idle_timeout_remember_me: 86400
    sso_session_max_lifespan_remember_me: 172800
    state: present
    enabled: true
  register: realm_result

- name: Create LDAP user federation for LLDAP in Keycloak
  delegate_to: localhost
  community.general.keycloak_user_federation:
    auth_keycloak_url: "{{ keycloak.url }}"
    auth_username: "{{ keycloak.admin_username }}"
    auth_password: "{{ keycloak_admin_password }}"
    auth_realm: "{{ keycloak.admin_realm }}"
    realm: "{{ keycloak.realm }}"
    state: present
    name: "lldap"
    provider_id: "ldap"
    config:
      connectionUrl: "{{ lldap_url }}"
      usersDn: "{{ ldap_users_dn }}"
      bindDn: "{{ ldap_svc_dn }}"
      bindCredential: "{{ svc_ldap_password }}"
      vendor: "other"
      authType: "simple"
      usernameLDAPAttribute: "uid"
      rdnLDAPAttribute: "uid"
      uuidLDAPAttribute: "entryUUID"
      userObjectClasses: "inetOrgPerson, person"
      searchScope: 2
      editMode: "READ_ONLY"
      fullSyncPeriod: 86400  # 24hr sync
      changedSyncPeriod: -1  # lldap does not support timestamp filters
      syncRegistrations: false
      trustEmail: true
      pagination: true
    mappers:
      - name: "creation date"
        providerId: "user-attribute-ldap-mapper"
        config:
          user.model.attribute: "createTimestamp"
          ldap.attribute: "createTimestamp"
          read.only: "true"
          alwaysReadValueFromLDAP: "true"
          isMandatory: "false"
          is.binary.attribute: "false"
      - name: "email"
        providerId: "user-attribute-ldap-mapper"
        config:
          user.model.attribute: "email"
          ldap.attribute: "mail"
          read.only: "true"
          alwaysReadValueFromLDAP: "false"
          isMandatory: "false"
          is.binary.attribute: "false"
      - name: "first name"
        providerId: "user-attribute-ldap-mapper"
        config:
          user.model.attribute: "firstName"
          ldap.attribute: "givenName"
          read.only: "true"
          alwaysReadValueFromLDAP: "true"
          isMandatory: "true"
          is.binary.attribute: "false"
      - name: "last name"
        providerId: "user-attribute-ldap-mapper"
        config:
          user.model.attribute: "lastName"
          ldap.attribute: "sn"
          read.only: "true"
          alwaysReadValueFromLDAP: "true"
          isMandatory: "true"
          is.binary.attribute: "false"
      - name: "modify date"
        providerId: "user-attribute-ldap-mapper"
        config:
          user.model.attribute: "modifyTimestamp"
          ldap.attribute: "modifyTimestamp"
          read.only: "true"
          alwaysReadValueFromLDAP: "true"
          isMandatory: "false"
          is.binary.attribute: "false"
      - name: "username"
        providerId: "user-attribute-ldap-mapper"
        config:
          user.model.attribute: "username"
          ldap.attribute: "uid"
          read.only: "true"
          alwaysReadValueFromLDAP: "false"
          isMandatory: "true"
          is.binary.attribute: "false"
      - name: "groups"
        providerId: "group-ldap-mapper"
        config:
          groups.dn: "{{ ldap_groups_dn }}"
          group.name.ldap.attribute: "cn"
          group.object.classes: "groupOfUniqueNames"
          membership.ldap.attribute: "uniqueMember"
          membership.attribute.type: "DN"
          groups.path: ""
          mode: "LDAP_ONLY"
          user.roles.retrieve.strategy: "LOAD_GROUPS_BY_MEMBER_ATTRIBUTE"
          drop.non.existing.groups.during.sync: "false"
          preserve.group.inheritance: "true"
          alwaysReadValueFromLDAP: "true"

- name: Create openid client scope
  community.general.keycloak_clientscope:
    auth_keycloak_url: "{{ keycloak.url }}"
    auth_username: "{{ keycloak.admin_username }}"
    auth_password: "{{ keycloak_admin_password }}"
    auth_realm: "{{ keycloak.admin_realm }}"
    realm: "{{ keycloak.realm }}"
    state: present
    name: "openid"
    description: "Client scope for OpenID Connect standard claims"
    protocol: "openid-connect"
    attributes:
      include.in.token.scope: "true"
      display.on.consent.screen: "true"
      consent.screen.text: "Access to OpenID Connect claims"
      include.in.assigned.scope: "default"
    protocol_mappers:
      - name: "openid"
        protocol: "openid-connect"
        protocolMapper: "oidc-usermodel-property-mapper"
        config:
          user.model.attribute: "user.id"
          claim.name: "openid"
          jsonType.label: "String"
          id.token.claim: true
          access.token.claim: true
          userinfo.token.claim: true

- name: Create username client scope
  community.general.keycloak_clientscope:
    auth_keycloak_url: "{{ keycloak.url }}"
    auth_username: "{{ keycloak.admin_username }}"
    auth_password: "{{ keycloak_admin_password }}"
    auth_realm: "{{ keycloak.admin_realm }}"
    realm: "{{ keycloak.realm }}"
    state: present
    name: "username"
    description: "Client scope for including username in tokens"
    protocol: "openid-connect"
    attributes:
      include.in.token.scope: "true"
      display.on.consent.screen: "true"
      consent.screen.text: "Access to username"
      include.in.assigned.scope: "default"
    protocol_mappers:
      - name: "username"
        protocol: "openid-connect"
        protocolMapper: "oidc-usermodel-property-mapper"
        config:
          user.model.attribute: "username"
          claim.name: "username"
          jsonType.label: "String"
          id.token.claim: true
          access.token.claim: true
          userinfo.token.claim: true

- name: Create groups client scope
  community.general.keycloak_clientscope:
    auth_keycloak_url: "{{ keycloak.url }}"
    auth_username: "{{ keycloak.admin_username }}"
    auth_password: "{{ keycloak_admin_password }}"
    auth_realm: "{{ keycloak.admin_realm }}"
    realm: "{{ keycloak.realm }}"
    state: present
    name: "groups"
    description: "Client scope for including group memberships in tokens"
    protocol: "openid-connect"
    attributes:
      include.in.token.scope: "true"
      display.on.consent.screen: "true"
      consent.screen.text: "Access to group memberships"
      include.in.assigned.scope: "default"
    protocol_mappers:
      - name: "groups"
        protocol: "openid-connect"
        protocolMapper: "oidc-group-membership-mapper"
        config:
          claim.name: "groups"
          full.path: "false"
          id.token.claim: true
          access.token.claim: true
          userinfo.token.claim: true

- name: Create ArgoCD OIDC client in Keycloak
  community.general.keycloak_client:
    auth_keycloak_url: "{{ keycloak.url }}"
    auth_username: "{{ keycloak.admin_username }}"
    auth_password: "{{ keycloak_admin_password }}"
    auth_realm: "{{ keycloak.admin_realm }}"
    realm: "{{ keycloak.realm }}"
    state: present
    client_id: argocd
    secret: "{{ argocd_client_secret }}"
    protocol: openid-connect
    enabled: true
    public_client: false
    redirect_uris:
      - "https://argocd.{{ lan_domain }}/auth/callback"
    web_origins:
      - "https://argocd.{{ lan_domain }}"
    default_client_scopes:
      - openid
      - profile
      - email
      - groups

- name: Create Harbor OIDC client in Keycloak
  community.general.keycloak_client:
    auth_keycloak_url: "{{ keycloak.url }}"
    auth_username: "{{ keycloak.admin_username }}"
    auth_password: "{{ keycloak_admin_password }}"
    auth_realm: "{{ keycloak.admin_realm }}"
    realm: "{{ keycloak.realm }}"
    state: present
    client_id: harbor
    secret: "{{ harbor_client_secret }}"
    client_authenticator_type: client-secret
    protocol: openid-connect
    enabled: true
    public_client: false
    standard_flow_enabled: true
    direct_access_grants_enabled: false
    service_accounts_enabled: false
    redirect_uris:
      - "https://harbor.{{ lan_domain }}/c/oidc/callback"
    web_origins:
      - "https://harbor.{{ lan_domain }}"
    default_client_scopes:
      - openid
      - profile
      - email
      - groups

- name: Get Keycloak admin token
  ansible.builtin.uri:
    url: "{{ keycloak.url }}/realms/{{ keycloak.admin_realm }}/protocol/openid-connect/token"
    method: POST
    body_format: form-urlencoded
    body:
      client_id: admin-cli
      username: "{{ keycloak.admin_username }}"
      password: "{{ keycloak_admin_password }}"
      grant_type: password
    return_content: true
  register: _keycloak_token
  no_log: true

- name: Look up harbor client UUID
  ansible.builtin.uri:
    url: "{{ keycloak.url }}/admin/realms/{{ keycloak.realm }}/clients?clientId=harbor"
    method: GET
    headers:
      Authorization: "Bearer {{ _keycloak_token.json.access_token }}"
    return_content: true
  register: _harbor_client_lookup

- name: Force-set harbor client secret
  ansible.builtin.uri:
    url: "{{ keycloak.url }}/admin/realms/{{ keycloak.realm }}/clients/{{ _harbor_client_lookup.json[0].id }}"
    method: PUT
    headers:
      Authorization: "Bearer {{ _keycloak_token.json.access_token }}"
      Content-Type: "application/json"
    body_format: json
    body:
      secret: "{{ harbor_client_secret }}"
    status_code: [204]
  no_log: true

- name: Get harbor admin password from Kubernetes secret
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Secret
    name: harbor-secrets
    namespace: harbor
  register: _harbor_secrets

- name: Set harbor admin password fact
  ansible.builtin.set_fact:
    harbor_admin_password: "{{ _harbor_secrets.resources[0].data['HARBOR_ADMIN_PASSWORD'] | b64decode }}"
  no_log: true

- name: Configure Harbor OIDC via API
  ansible.builtin.uri:
    url: "https://harbor.{{ lan_domain }}/api/v2.0/configurations"
    method: PUT
    user: admin
    password: "{{ harbor_admin_password }}"
    force_basic_auth: true
    body_format: json
    body:
      auth_mode: oidc_auth
      oidc_name: Homelab
      oidc_endpoint: "https://sso.{{ lan_domain }}/realms/{{ keycloak.realm }}"
      oidc_client_id: harbor
      oidc_client_secret: "{{ harbor_client_secret }}"
      oidc_scope: "openid,profile,email,groups,offline_access"
      oidc_user_claim: preferred_username
      oidc_groups_claim: groups
      oidc_auto_onboard: true
      oidc_verify_cert: true
    status_code: [200]
  no_log: false
