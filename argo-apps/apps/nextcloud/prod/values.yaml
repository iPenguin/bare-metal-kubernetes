image:
  repository: nextcloud
  flavor: fpm
  pullPolicy: IfNotPresent

ingress:
  enabled: true
  className: "traefik"
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    traefik.ingress.kubernetes.io/router.middlewares: nextcloud-nextcloud-redirectregex@kubernetescrd,nextcloud-nextcloud-headers@kubernetescrd
  ipFamilyPolicy: PreferDualStack
  ipFamilies:
    - IPv4
    - IPv6

phpClientHttpsFix:
  enabled: false
  protocol: https

nextcloud:
  host: nextcloud.clt.milco.casa
  extraEnv:
    - name: TRUSTED_PROXIES
      value: "10.200.0.0/16 172.16.0.0/12"
    - name: OVERWRITECLIURL
      value: "https://nextcloud.clt.milco.casa"
    - name: OVERWRITEPROTOCOL
      value: "https"
    - name: OVERWRITEHOST
      value: "nextcloud.clt.milco.casa"
    # - name: NEXTCLOUD_CONFIG_KEYCLOAK_CLIENT_SECRET
    #   valueFrom:
    #     secretKeyRef:
    #       name: nextcloud-secrets
    #       key: client-secret

  existingSecret:
    enabled: true
    secretName: nextcloud-secrets
    usernameKey: admin_username
    passwordKey: admin_password
  containerPort: 8080
  datadir: /var/www/html/data
  trustedDomains:
    - nextcloud.clt.milco.casa
    - nextcloud.nextcloud.svc.cluster.local
    - nextcloud.nextcloud.svc
  ## SMTP configuration
  mail:
    enabled: false
  ## Primary ObjectStore options
  objectStore:
    s3:
      enabled: false

nginx:
  enabled: true
  image:
    repository: nginx
    tag: alpine
    pullPolicy: IfNotPresent
  containerPort: 8080
  ipFamilyPolicy: PreferDualStack
  ipFamilies:
    - IPv4
    - IPv6

internalDatabase:
  enabled: false
externalDatabase:
  enabled: true
  type: postgresql
  host: "nextcloud-postgresql-0"
  existingSecret:
    enabled: true
    secretName: nextcloud-secrets
    usernameKey: db_username
    passwordKey: db_password

postgresql:
  enabled: true
  auth:
    username: nextcloud
    database: nextcloud
    existingSecret: nextcloud-secrets
    secretKeys:
      adminPasswordKey: db_password
      userPasswordKey: db_user_password
  primary:
    initdb:
      scriptsSecret: nextcloud-secrets
    persistence:
      enabled: true
      size: 10Gi

collabora:
  enabled: false
cronjob:
  enabled: true

service:
  type: ClusterIP
  port: 8080
  ipFamilyPolicy: PreferDualStack
  ipFamilies:
    - IPv4
    - IPv6

persistence:
  enabled: true
  storageClass: "cephfs"
  accessMode: ReadWriteMany
  size: 8Gi
  nextcloudData:
    enabled: true
    existingClaim: nextcloud-data

resources:
  limits:
     memory: 8Gi
  requests:
    cpu: 1
    memory: 2Gi

hpa:
  enabled: false

metrics:
  enabled: false

rbac:
  enabled: true
  serviceaccount:
    create: true
    name: nextcloud-serviceaccount

redis:
  enabled: false

nodeSelector:
  clt.milco.casa/node-performance: high

tolerations:
  - key: "nvidia.com/gpu"
    operator: "Equal"
    effect: "NoSchedule"

