---
credentials:
  useSecret: true
  existingSecret: velero-minio-secrets

serviceAccount:
  server:
    create: true
    name: velero

configuration:
  backupStorageLocation:
    - name: local
      provider: aws
      bucket: velero-backups
      default: true
      config:
        region: minio
        s3ForcePathStyle: "true"
        s3Url: https://minio-local.clt.milco.casa
    - name: backblaze
      provider: aws
      bucket: milco-cluster-backups
      prefix: velero
      config:
        region: us-west-002
        s3ForcePathStyle: true
        s3Url: https://s3.us-west-002.backblazeb2.com
      credential:
        name: velero-backblaze-secrets
        key: cloud

  # Explicitly disable VolumeSnapshotLocation if not needed
  volumeSnapshotLocation: []

defaultVolumesToFsBackup: true
deployNodeAgent: true
uploaderType: kopia

# CRDs applied manually — see docs. Hook image churn (Bitnami deprecation,
# distroless shell mismatch, hook SA token 401) made the hook unreliable.
upgradeCRDs: false

featureFlags:
  - EnableUnifiedRepo

initContainers:
  - name: velero-plugin-for-aws
    image: velero/velero-plugin-for-aws:v1.11.1
    volumeMounts:
      - mountPath: /target
        name: plugins

schedules:
  local-backups:
    schedule: "0 0 * * *"
    template:
      ttl: 720h  # 30 days
      includedNamespaces:
        - "*"
      excludedNamespaces:
        - minio
        - velero
      includedResources:
        - "*"
      defaultVolumesToFsBackup: true
      includeClusterResources: true
      storageLocation: local
  offsite-backups:
    schedule: "0 3 * * 0"  # weekly, Sundays 03:00
    template:
      ttl: 8760h  # 1 year
      includedNamespaces:
        - cert-manager
        - concourse
        - gitea
        - keycloak
        - lldap
        - nextcloud
        - openbao
        - rook-ceph
      includedResources:
        - "*"
      defaultVolumesToFsBackup: true
      includeClusterResources: true
      storageLocation: backblaze
