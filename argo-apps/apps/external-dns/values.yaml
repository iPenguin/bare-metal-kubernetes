---
# ExternalDNS with OpenWrt webhook provider (sidecar pattern)
# https://github.com/ipenguin/external-dns-openwrt-webhook

image:
  repository: registry.k8s.io/external-dns/external-dns
  pullPolicy: IfNotPresent

provider:
  name: webhook
  webhook:
    image:
      repository: ghcr.io/ipenguin/external-dns-openwrt-webhook
      tag: latest
      pullPolicy: Always
    env:
      - name: PROVIDER_OPENWRT_LUCIRPC_HOSTNAME
        value: "r.milco.casa"
      - name: PROVIDER_OPENWRT_LUCIRPC_PORT
        value: "443"
      - name: PROVIDER_OPENWRT_LUCIRPC_SSL
        value: "true"
      - name: PROVIDER_OPENWRT_LUCIRPC_INSECURE_SKIP_VERIFY
        value: "false"
      - name: PROVIDER_OPENWRT_LUCIRPC_AUTH_USERNAME
        value: "luci-dns"
      - name: PROVIDER_OPENWRT_LUCIRPC_AUTH_PASSWORD
        valueFrom:
          secretKeyRef:
            name: external-dns-secrets
            key: openwrt-password
    livenessProbe:
      httpGet:
        path: /ping
        port: 8888
      initialDelaySeconds: 10
      periodSeconds: 10
    readinessProbe:
      httpGet:
        path: /ping
        port: 8888
      initialDelaySeconds: 10
      periodSeconds: 10

sources:
  - ingress
  - service

domainFilters:
  - "clt.milco.casa"

policy: sync

registry: txt
txtOwnerId: "external-dns-homelab"
txtPrefix: "edns-"

interval: 1m

logLevel: info
logFormat: text

serviceAccount:
  create: true
  name: external-dns

rbac:
  create: true

podSecurityContext:
  fsGroup: 65534
  runAsNonRoot: true
  runAsUser: 65534
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true

