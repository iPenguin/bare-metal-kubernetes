---
# Seal this with: kubectl create secret generic external-dns-secrets -n external-dns \
#   --dry-run=client \
#   --from-file=openwrt-ssh-key=<path-to-private-key> \
#   | kubeseal --format yaml
#
# Generate an ed25519 key pair:
#   ssh-keygen -t ed25519 -f external-dns-openwrt -C "external-dns@homelab" -N ""
# Add the public key to OpenWrt: /etc/dropbear/authorized_keys
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  creationTimestamp: null
  name: external-dns-secrets
  namespace: external-dns
spec:
  encryptedData:
    openwrt-ssh-key: REPLACE_WITH_SEALED_VALUE
  template:
    metadata:
      creationTimestamp: null
      name: external-dns-secrets
      namespace: external-dns
