---
# Seal this with: kubectl create secret generic lldap-secrets -n lldap \
#   --dry-run=client \
#   --from-literal=LLDAP_JWT_SECRET=<64-char-random-string> \
#   --from-literal=LLDAP_LDAP_USER_PASS=<lldap-admin-password> \
#   | kubeseal --format yaml
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  creationTimestamp: null
  name: lldap-secrets
  namespace: lldap
spec:
  encryptedData:
    LLDAP_JWT_SECRET: REPLACE_WITH_SEALED_VALUE
    LLDAP_LDAP_USER_PASS: REPLACE_WITH_SEALED_VALUE
  template:
    metadata:
      creationTimestamp: null
      name: lldap-secrets
      namespace: lldap
