---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: lldap
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - list:
        elements:
          - host: lldap
  template:
    metadata:
      name: lldap
    spec:
      syncPolicy:
        automated: {}
        syncOptions:
          - CreateNamespace=true
          - Confirm=true
      project: lldap
      destination:
        namespace: lldap
        server: https://kubernetes.default.svc
      sources:
        - repoURL: https://github.com/ipenguin/bare-metal-kubernetes.git
          targetRevision: master
          path: argo-apps/apps/lldap
        - repoURL: https://github.com/ipenguin/bare-metal-kubernetes.git
          targetRevision: master
          ref: valuesSrc
        - repoURL: 'https://djjudas21.github.io/charts/'
          chart: lldap
          targetRevision: 0.6.3
          helm:
            valueFiles:
              - '$valuesSrc/argo-apps/apps/lldap/values.yaml'
