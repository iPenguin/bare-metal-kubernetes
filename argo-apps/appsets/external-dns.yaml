---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: external-dns
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - list:
        elements:
          - host: external-dns
  template:
    metadata:
      name: external-dns
    spec:
      syncPolicy:
        automated: {}
        syncOptions:
          - CreateNamespace=true
          - Confirm=true
      project: external-dns
      destination:
        namespace: external-dns
        server: https://kubernetes.default.svc
      sources:
        - repoURL: https://github.com/ipenguin/bare-metal-kubernetes.git
          targetRevision: master
          path: argo-apps/apps/external-dns
        - repoURL: https://github.com/ipenguin/bare-metal-kubernetes.git
          targetRevision: master
          ref: valuesSrc
        - repoURL: 'https://kubernetes-sigs.github.io/external-dns/'
          chart: external-dns
          targetRevision: 1.15.0
          helm:
            valueFiles:
              - '$valuesSrc/argo-apps/apps/external-dns/values.yaml'
