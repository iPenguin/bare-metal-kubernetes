---
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: external-dns
  namespace: argocd
spec:
  description: ExternalDNS with OpenWrt webhook provider
  destinations:
    - namespace: argocd
      server: '*'
    - namespace: external-dns
      server: '*'
  clusterResourceWhitelist:
    - group: '*'
      kind: '*'
  sourceRepos:
    - https://github.com/ipenguin/bare-metal-kubernetes.git
    - https://kubernetes-sigs.github.io/external-dns/
